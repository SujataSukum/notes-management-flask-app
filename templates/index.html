<!DOCTYPE html>
<html>
<head>
    <title>Notes App</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }

        /* Main App Background */
        .main-bg {
            background: linear-gradient(to right, #667eea, #764ba2);
        }

        /* Login Background */
        .login-bg {
            background: linear-gradient(to right, #0f172a, #0d9488, #020617);
        }

        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
    </style>
</head>

<body>

<!-- ================= LOGIN PAGE ================= -->
<div id="loginPage" class="login-bg flex items-center justify-center min-h-screen">

    <div class="bg-white/10 backdrop-blur-lg p-8 rounded-2xl shadow-2xl w-96 text-white border border-white/20">

        <h2 class="text-3xl font-semibold text-center mb-6">
            🔐 Welcome Back
        </h2>

        <input id="username" type="text" placeholder="Username"
            class="w-full p-3 mb-3 rounded bg-white/20 border border-white/30 placeholder-gray-300 outline-none focus:ring-2 focus:ring-teal-400">

        <input id="password" type="password" placeholder="Password"
            class="w-full p-3 mb-4 rounded bg-white/20 border border-white/30 placeholder-gray-300 outline-none focus:ring-2 focus:ring-teal-400">

        <button onclick="login()"
            class="w-full py-3 rounded bg-gradient-to-r from-teal-400 to-green-500 hover:scale-105 transition duration-300 font-semibold">
            Login
        </button>

        <p id="loginError" class="text-red-400 text-sm mt-3 text-center hidden">
            Invalid username or password
        </p>

        <p class="text-center text-gray-300 text-sm mt-6">
            Notes Manager 🔥
        </p>

    </div>
</div>

<!-- ================= MAIN APP ================= -->
<div id="appPage" class="hidden main-bg flex items-center justify-center min-h-screen">

    <div class="glass w-full max-w-xl p-6 text-white">

        <h1 class="text-3xl font-semibold text-center mb-6">✨ Notes Manager</h1>

        <!-- INPUT -->

        <input id="title" type="text" placeholder="Title"
            class="w-full p-3 rounded bg-white/20 border border-white/30 mb-3 placeholder-white outline-none">

        <textarea id="content" placeholder="Write your note..."
            class="w-full p-3 rounded bg-white/20 border border-white/30 mb-3 placeholder-white outline-none"></textarea>

        <button id="mainBtn" onclick="addNote()"
            class="w-full py-3 rounded bg-gradient-to-r from-blue-400 to-purple-500 hover:scale-105 transition duration-300">
            Add Note
        </button>

        <!-- SEARCH BAR -->
        <input id="search" type="text" placeholder="🔍 Search notes..."
        class="w-full p-3 mt-4 rounded-xl bg-white/20 border border-white/30 placeholder-gray-200 outline-none focus:ring-2 focus:ring-purple-400"
        onkeyup="loadNotes()">


        <!-- NOTES -->
        <div id="notesList" class="mt-6 space-y-3"></div>

    </div>

</div>

<script>

let currentEdit = null;

// 🔐 LOGIN FUNCTION
function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if (user === "admin" && pass === "1234") {
        document.getElementById("loginPage").classList.add("hidden");
        document.getElementById("appPage").classList.remove("hidden");
        loadNotes();
    } else {
        document.getElementById("loginError").classList.remove("hidden");
    }
}

// ➕ ADD / UPDATE
async function addNote() {
    let title = document.getElementById("title").value;
    let content = document.getElementById("content").value;

    if (currentEdit) {
        await fetch('/update', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: currentEdit, content })
        });

        currentEdit = null;
        document.getElementById("mainBtn").innerText = "Add Note";
    } else {
        await fetch('/add', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, content })
        });
    }

    document.getElementById("title").value = "";
    document.getElementById("content").value = "";

    loadNotes();
}

async function loadNotes() {
    let res = await fetch('/notes');
    let data = await res.json();

    let searchText = document.getElementById("search").value.toLowerCase();

    let output = "";

    for (let key in data) {

        let title = key.toLowerCase();
        let content = data[key].content.toLowerCase();

        // 🔍 SEARCH FILTER
        if (title.includes(searchText) || content.includes(searchText)) {

            output += `
            <div class="bg-white/20 p-3 rounded mt-2 flex justify-between">

                <div>
                    <h2>${key}</h2>

                    ${data[key].pinned ? '<span class="text-green-300 text-xs">📌 Pinned</span>' : ''}

                    <p>${data[key].content}</p>
                    <p class="text-xs">🕒 ${data[key].time}</p>
                </div>

                <div class="flex gap-2">

                    <button onclick="editNote('${key}', '${data[key].content}')"
                        class="bg-yellow-400 px-2 rounded">✏️</button>

                    <button onclick="deleteNote('${key}')"
                        class="bg-red-500 px-2 rounded">🗑️</button>

                </div>
            </div>
            `;
        }
    }

    document.getElementById("notesList").innerHTML = output;
}
// ✏️ EDIT
function editNote(title, content) {
    document.getElementById("title").value = title;
    document.getElementById("content").value = content;

    currentEdit = title;

    document.getElementById("mainBtn").innerText = "Update Note";
}

// ❌ DELETE
async function deleteNote(title) {

    let confirmDelete = confirm("Are you sure you want to delete this note?");

    if (!confirmDelete) return;

    await fetch(`/delete/${title}`, { method: 'DELETE' });

    loadNotes();
}


</script>

</body>
</html>
